<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财务人超市 - 登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
  background: url('/bg.jpg') center/cover no-repeat fixed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
}

.brand {
  text-align: center;
  margin-bottom: 32px;
}
.brand .icon { font-size: 48px; display: block; margin-bottom: 8px; }
.brand h1 {
  font-size: 24px;
  color: #1a3a6b;
  font-weight: 600;
}
.brand p {
  font-size: 13px;
  color: #999;
  margin-top: 4px;
}

.tabs {
  display: flex;
  margin-bottom: 24px;
  border-bottom: 2px solid #f0f0f0;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 10px 0;
  font-size: 15px;
  font-weight: 500;
  color: #999;
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
}
.tab.active {
  color: #2c5aa0;
  border-bottom-color: #2c5aa0;
}

.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 13px;
  color: #666;
  margin-bottom: 6px;
  font-weight: 500;
}
.form-group input {
  width: 100%;
  padding: 12px 14px;
  border: 2px solid #e8e8e8;
  border-radius: 8px;
  font-size: 15px;
  color: #333;
  transition: border-color 0.2s;
  outline: none;
  background: #fafbfc;
}
.form-group input:focus {
  border-color: #2c5aa0;
  background: #fff;
}

.hidden { display: none !important; }

.btn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #1a3a6b, #2c5aa0);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:hover { opacity: 0.92; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

.error-msg {
  background: #fff2f0;
  border: 1px solid #ffccc7;
  color: #cf1322;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}
.error-msg.show { display: block; }

.success-msg {
  background: #f6ffed;
  border: 1px solid #b7eb8f;
  color: #389e0d;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}
.success-msg.show { display: block; }

.footer-text {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #bbb;
}

.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <span class="icon">🛒</span>
    <h1>财务人超市</h1>
    <p>证监会法规 · 巨潮公告 · 税务咨询</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">登录</button>
    <button class="tab" onclick="switchTab('register')">注册</button>
  </div>

  <div id="errorMsg" class="error-msg"></div>
  <div id="successMsg" class="success-msg"></div>

  <!-- Login form -->
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>账号</label>
      <input type="text" id="loginEmail" placeholder="请输入账号" required autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="loginPassword" placeholder="请输入密码" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="loginBtn">登 录</button>
  </form>

  <!-- Register form -->
  <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="regEmail" placeholder="请输入邮箱" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>昵称（可选）</label>
      <input type="text" id="regName" placeholder="给自己起个名字吧" autocomplete="name">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="regPassword" placeholder="至少6位密码" required autocomplete="new-password" minlength="6">
    </div>
    <button type="submit" class="btn" id="registerBtn">注 册</button>
  </form>

  <div class="footer-text">财务人自己的工具箱</div>
</div>

<script>
let mode = 'login';

function switchTab(tab) {
  mode = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
  });
  document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
  hideMessages();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('successMsg').classList.remove('show');
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
}

function hideMessages() {
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('successMsg').classList.remove('show');
}

function setLoading(btn, loading) {
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>处理中...' : (mode === 'login' ? '登 录' : '注 册');
}

async function handleLogin(e) {
  e.preventDefault();
  hideMessages();
  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  setLoading(btn, true);

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if (r.ok) {
      showSuccess('登录成功，正在跳转...');
      setTimeout(() => { window.location.href = '/'; }, 500);
    } else {
      showError(d.error || '登录失败');
    }
  } catch(err) {
    showError('网络错误，请稍后重试');
  }
  setLoading(btn, false);
}

async function handleRegister(e) {
  e.preventDefault();
  hideMessages();
  const btn = document.getElementById('registerBtn');
  const email = document.getElementById('regEmail').value.trim();
  const name = document.getElementById('regName').value.trim();
  const password = document.getElementById('regPassword').value;
  setLoading(btn, true);

  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, name: name || undefined, password })
    });
    const d = await r.json();
    if (r.ok) {
      showSuccess('注册成功，正在进入...');
      setTimeout(() => { window.location.href = '/'; }, 500);
    } else {
      showError(d.error || '注册失败');
    }
  } catch(err) {
    showError('网络错误，请稍后重试');
  }
  setLoading(btn, false);
}

// Check if already logged in
fetch('/api/auth/session').then(r => r.json()).then(d => {
  if (d.loggedIn) { window.location.href = '/'; }
});
</script>

</body>
</html>
